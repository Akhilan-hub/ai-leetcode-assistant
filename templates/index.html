<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetHelper — AI DSA Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="brand-mark">&lt;/&gt;</span> LeetHelper
    <span class="brand-sub">AI DSA Companion</span>
  </div>
  <div class="topbar-actions">
    <button id="historyBtn" class="ghost-btn">history</button>
    <button id="favBtn" class="ghost-btn">★ favorites</button>
  </div>
</div>

<div class="app">

  <!-- LEFT: Input panel -->
  <div class="panel input-panel">
    <div class="panel-head">
      <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
      <span class="panel-title">problem.txt</span>
    </div>
    <div class="panel-body">
      <label class="field-label">Question name</label>
      <input id="questionName" type="text" placeholder="e.g. Two Sum" />

      <label class="field-label">Paste the problem statement</label>
      <textarea id="questionText" rows="9" placeholder="Given an array of integers nums and an integer target..."></textarea>

      <label class="checkbox-row">
        <input type="checkbox" id="tamilToggle" />
        <span>Tamil explanation venum (optional)</span>
      </label>

      <label class="field-label">Your code (for review / dry run / complexity)</label>
      <textarea id="userCode" rows="10" placeholder="def twoSum(nums, target):\n    ..."></textarea>

      <div class="row two-col">
        <div>
          <label class="field-label">Language</label>
          <select id="language">
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="cpp">C++</option>
            <option value="javascript">JavaScript</option>
          </select>
        </div>
        <div>
          <label class="field-label">Sample input (for dry run)</label>
          <input id="sampleInput" type="text" placeholder="nums=[2,7,11,15], target=9" />
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Output / tabs panel -->
  <div class="panel output-panel">
    <div class="tabs" id="tabs">
      <button class="tab active" data-action="explain">① Understand</button>
      <button class="tab" data-action="approach">② Approach</button>
      <button class="tab" data-action="complexity">③ Complexity</button>
      <button class="tab" data-action="hints">④ Hints</button>
      <button class="tab" data-action="review">⑤ Code Review</button>
      <button class="tab" data-action="dryrun">⑥ Dry Run</button>
    </div>

    <div class="panel-body output-body" id="outputBody">
      <div class="empty-state">
        <p>Paste a problem on the left, pick a tab, and hit <strong>Run</strong>.</p>
        <p class="muted">Output renders here — explanations, approaches, complexity, hints, code review or dry run.</p>
      </div>
    </div>

    <div class="run-bar">
      <span id="statusText" class="status-text"></span>
      <button id="runBtn" class="run-btn">▶ Run</button>
    </div>
  </div>

</div>

<!-- History / Favorites Drawer -->
<div id="drawer" class="drawer">
  <div class="drawer-head">
    <span id="drawerTitle">History</span>
    <button id="drawerClose" class="ghost-btn">✕</button>
  </div>
  <div id="drawerBody" class="drawer-body"></div>
</div>
<div id="drawerOverlay" class="drawer-overlay"></div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
